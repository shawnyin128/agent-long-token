unplanned_changes:
  - loc: agentdiet/analysis/ablate.py
    what: |
      Removed BudgetExceeded exception class after deciding soft-stop
      ("mark remaining rows skipped") is more useful than hard-fail.
      Tests use skip_reason check instead of pytest.raises.
    reason: |
      Partial results are more valuable than all-or-nothing for Gate-2
      decision; aligns with spec §6.4 fallback style.
    confidence: 92
  - loc: agentdiet/analysis/ablate.py
    what: |
      select_subset does NOT fall back to on-demand run_single_agent
      when pilot artifact missing — those qids are dropped silently.
      D1's plan said it would.
    reason: |
      Out-of-scope for this iteration; the real workflow runs pilot
      before ablation and the fallback adds a new hot path that
      needs its own test plan. Will add if Day-2 shows gaps.
    confidence: 78
  - loc: agentdiet/cli/ablate.py
    what: |
      Gate-2 classification added as _classify_delta helper
      (likely/noise/unclear) and _render_gate2 emits a markdown table.
    reason: |
      Plan said gate2 report; this is the implementation surface —
      consistent with cli/gate.py from pilot-gate1.
    confidence: 90

flags_for_eval:
  - |
    Cache hit correctness when drop_type has no claims: the
    reconstructed api_messages should match the original run_debate
    sequence verbatim so cached entries are reused. Verify this holds.
  - |
    Budget accounting: `llm_client.call_count - baseline_calls` is
    checked BEFORE each (qid, type) pair. A single pair's calls can
    push the count over the cap mid-pair, but subsequent pairs will
    be correctly skipped. Confirm this is acceptable.
  - |
    Gate-2 thresholds — exact boundary behavior (>= vs >) when
    |delta| equals LIKELY/NOISE/PASS thresholds; tests should lock
    the edge semantics.
  - |
    Subset selection silently skips qids missing the pilot-single
    artifact. Confirm this is the intended behavior (D1 deviation).

