flags_for_eval:
  - |
    reparse CLI not executed locally (missing pydantic in system
    python3). HPC side must run `make test` after pull to verify the
    S2 test file passes end-to-end.
  - |
    Atomic write uses path.suffix '.tmp' — if artifact path already
    has '.tmp' (shouldn't, but defensively) we'd collide. Consider
    later.
  - |
    reparse does NOT update claim artifacts or analysis artifacts.
    Those consume dialogues[].messages, not final_answer, so they're
    unaffected by this fix. But if a future parser change affects
    claim extraction outputs, a separate reparse path is needed.

