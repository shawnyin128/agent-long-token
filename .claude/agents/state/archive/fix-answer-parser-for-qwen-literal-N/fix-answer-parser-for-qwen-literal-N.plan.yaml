plan_id: fix-answer-parser-for-qwen-literal-N
iteration: 1
based_on: docs/design-docs/2026-04-21-multi-agent-debate-claim-analysis-design.md

problem: |
  Real Qwen2.5-7B output on GSM8K ends with `#### N66` instead of the
  intended `#### 66` — the model learned the literal 'N' from the
  prompt "End with '#### N' where N is the final numeric answer". The
  current parser regex `####\s*(-?[\d,]+...)` requires an immediate
  digit, so `#### N66` does NOT match. Parser falls through to a $
  regex using `.search()` (first match), which picks the first
  price-like number in the response (e.g. $16 for a book) rather
  than the intended total. Gate-1 pilot shows delta=0.0pp and both
  methods at 66.7% — the real accuracy is much higher but all
  multi-$-answer questions are mis-parsed. This feature fixes both
  the parser (defense in depth) and the prompt (root cause), then
  re-parses existing pilot/collection artifacts in place without any
  LLM calls so HPC data does not need to be regenerated.

steps:
  - id: S1
    desc: parser regex + agent prompts
    approach: |
      Patch agentdiet/dataset.py:
        - _ANSWER_RE_FINAL_HASHES regex: allow optional letters between
          #### and the number. New pattern:
          r"####\s*[A-Za-z]*\s*(-?[\d,]+\.?\d*)"
          This matches `#### 66`, `#### N66`, `#### N 66`, `#### ans 42`,
          still anchored to the #### marker so it's precise.
      Patch agentdiet/agents.py:
        - Solver / Skeptic / Synthesizer system prompts: replace
          "End your response with a line containing exactly '#### N'
           where N is the final numeric answer."
          with
          "End your response with a line containing exactly '#### <answer>'
           (for example '#### 42')."
        - Identical wording change across all three roles to keep
          diff reviewable.
    files:
      create: []
      modify: [agentdiet/dataset.py, agentdiet/agents.py]
      test: [tests/fix_answer_parser/test_parser_regex.py, tests/fix_answer_parser/test_agent_prompts.py]
    test_plan:
      - Parser returns correct number for '#### 66', '#### N66', '#### N 66', '#### ANS 66'
      - Parser still returns correct number for negatives '#### -5' and decimals '#### 3.14'
      - Parser still refuses '#### forty-two' (no digits at all) → None via regex miss, falls to later fallbacks
      - Agent prompt NO LONGER contains the literal "'#### N'" substring
      - Agent prompt contains the example "'#### 42'" so the model has a concrete template
      - All 3 role prompts changed consistently (same new wording)
    coverage_min: 100

  - id: S2
    desc: reparse CLI (no LLM calls)
    approach: |
      Add agentdiet/cli/reparse.py with:
        - reparse_pilot(cfg) -> dict
          walks cfg.artifacts_dir/pilot/{single,debate}/{model_slug}/*.json,
          for each loads the Dialogue, re-runs parse_answer on every
          message to recompute per_agent_final_answers (debate) or
          final_answer (single), atomic-writes back.
        - reparse_dialogues(cfg) -> dict
          walks cfg.dialogues_dir/*.json, same thing — recomputes
          majority_vote over last-round messages and updates
          final_answer + meta.per_agent_final_answers.
        - CLI flags: --pilot, --dialogues, --all (default), --dry-run,
          --report-counts
        - Reports per-directory: {visited, changed, unchanged, errored}
        - Never calls the LLM.
    files:
      create: [agentdiet/cli/reparse.py]
      modify: []
      test: [tests/fix_answer_parser/test_reparse_cli.py]
    test_plan:
      - Given a dialogue with old parser's final_answer='16' but
        messages that new parser reads as '66', reparse updates
        final_answer to '66' and touches per_agent_final_answers
      - Dialogue already correct → reparse_counts['changed'] == 0
      - --dry-run prints counts but does NOT write
      - reparse_pilot handles single (1 message) and debate (N×R messages) correctly
      - Atomic write — .tmp file cleaned up, no corruption on interrupt
      - Non-JSON file in the dir → logs error, continues to next

  - id: S3
    desc: runbook + make target
    approach: |
      Update README HPC runbook: after "git pull" (after this fix
      lands) add a "re-parse existing artifacts" step so the user
      does NOT regenerate dialogues:
        make reparse          # new target → python -m agentdiet.cli.reparse
        make gate             # re-run gate with corrected final_answers
      Add Makefile target 'reparse' invoking cli/reparse.py with no
      flags (== --all).
    files:
      create: []
      modify: [Makefile, README.md]
      test: [tests/fix_answer_parser/test_runbook.py]
    test_plan:
      - Makefile declares `reparse` target in .PHONY with recipe
      - README has a "Fix answer parser" section or an inline block
        in Gate-1 troubleshooting that mentions `make reparse`
      - README mentions the root cause (Qwen literal 'N') so a future
        reader understands why the step exists

decisions:
  - id: D1
    question: How permissive should the '####' regex be?
    planner_view: optional-alpha-prefix-only
    confidence: 88
    rationale: |
      Real observed failure mode is `#### N<num>`. Adding
      `[A-Za-z]*\s*` between #### and the number covers that plus
      mild variants ("#### ANS 42", "#### answer 42") without
      opening the door to matching random text — we still anchor on
      ####. Not using `.*` because that could swallow too much on
      a multi-line response and pick a stray number.
    alternatives:
      - option: allow [^\d]* (any non-digit run)
        rejected_because: Over-permissive; could cross line boundaries
          and eat through prose before finding a number.
      - option: regex-only solution, do not change prompt
        rejected_because: Leaves root cause in place; future models
          may learn different literal prefixes.
    ask_user: false
    user_decision: null

  - id: D2
    question: Re-parse idempotent in-place or write a new file?
    planner_view: in-place-atomic
    confidence: 90
    rationale: |
      Artifact paths are consumers' canonical location; writing a
      parallel ..._reparsed.json would double storage and needs new
      readers. Atomic write (.tmp + rename) is already the house
      pattern across all CLIs. Old final_answer is recoverable from
      git if anyone cares.
    alternatives:
      - option: write reparsed/{qid}.json sibling
        rejected_because: Forces downstream to choose source; doubles
          disk; out of step with collect/extract/analyze conventions.
    ask_user: false
    user_decision: null

  - id: D3
    question: Update LLM cache too?
    planner_view: no-cache-is-raw-response-only
    confidence: 95
    rationale: |
      artifacts/llm_cache.jsonl stores raw LLM response strings keyed
      by sha256(model,temp,messages). Parse happens OUTSIDE the cache.
      Cache is unaffected by parser changes — that's the whole point
      of separating the layers (spec §2.1).
    alternatives:
      - option: also re-process cache
        rejected_because: Cache has no final_answer field to update.
    ask_user: false
    user_decision: null

