          - "figures_skipped flag in run_report_cli return dict — cheap observability"
        unplanned_rejected: []

      tests:
        S1:
          pass: 9
          fail: 0
          coverage: 100
          tests_file: tests/report_generation/test_data_prep.py
        S2:
          pass: 6 + 5
          fail: 0
          coverage: 100_tables + matplotlib_gated_figures
          tests_file: tests/report_generation/test_tables.py + test_figures.py
          notes: |
            Figure tests skipped (matplotlib not installed locally) but
            will run on analysis-extras environment.
        S3:
          pass: 5 + 5
          fail: 0
          coverage: 90
          tests_file: tests/report_generation/test_report_cli.py + test_runbook.py

      full_suite_regression:
        total_pass: 412
        total_skip: 5
        total_fail: 0
        notes: |
          5 skips = 4 pre-existing network-gated dataset tests + 1
          matplotlib-gated figure test suite (expected on base deps).

      blockers: []
      verdict: PASS

  optimization:
    suggestions:
      - loc: agentdiet/report.py
        what: |
          LaTeX escape could cover $ # { } \ for defensive future-
          proofing. Current set (_ % &) is sufficient for this project.
      - loc: agentdiet/cli/report.py
        what: |
          Consider writing a figures_manifest.json listing emitted
