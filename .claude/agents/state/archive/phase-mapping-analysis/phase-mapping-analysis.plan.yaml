          ever reorders one set, the bootstrap would silently
          mispair without raising. Add a qid-equality assertion in
          load_cell_summary so any future order drift fails loudly.
      - loc: agentdiet/analysis_phase/characterize.py
        what: |
          cross_model_agreement compares only the first two
          families when a group has 3+ families
          (family_list[0], family_list[1]). Today the grid has 2
          families so no rows hit this branch. If a third model
          (gpt-5-mini API probe) lands, the third family's delta
          is silently dropped. Either iterate all pairs or document
          the 2-family contract explicitly.
      - loc: agentdiet/analysis_phase/characterize.py
        what: |
