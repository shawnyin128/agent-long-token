unplanned_changes:
  - loc: agentdiet/cli/analyze_phase.py
    what: |
      Module renamed from cli/analyze.py to cli/analyze_phase.py.
      The plan called for cli/analyze.py but that file already
      hosts the RQ0 flip-events / claim-signals CLI used by
      tests/flip_and_signals/. Importing two CLIs as
      agentdiet.cli.analyze would clobber tests; renaming new
      one isolates them. Spec §6 doesn't mandate the exact module
      name.
    reason: |
      Avoided overwriting the RQ0 CLI; preserved the 59 RQ0
      flip-and-signals tests intact.
    confidence: 90

flags_for_eval:
  - "Bootstrap quantile method: paired_bootstrap_delta uses
     numpy.quantile on the resampled delta distribution to compute
     CI endpoints. This is the percentile method (not BCa).
     Spec §4.7 says only 'paired bootstrap' / 'derive a 95% CI';
     we go percentile for simplicity. Worth confirming the
     percentile vs BCa choice is in scope for the report
     methodology section."
  - "AIME per-year qid parsing assumes 'aime-<year>-q<idx>' format.
     If a future loader emits a different shape (e.g. dataset
     id-based qids), aime_per_year silently returns no rows.
     Tests use the fixture format."
  - "render_phase_diagram requires matplotlib. The CI / test env
     here has matplotlib installed (we pulled it during S2). On
     fresh installs without agentdiet[analysis], --skip-figure is
     the workaround. The corresponding test in test_cli_analyze.py
     uses pytest.importorskip('matplotlib') for the figure path."
  - "voting_wrong_debate_right reads voting.json + debate.json
     directly from disk by cell_dirname rather than going through
     CellAnalysis. Tests cover the happy path + max_results +
     no-match. If the per-question schema ever changes, this
     reader must be updated alongside the loader."

# ============================================================
# EVALUATOR section
# ============================================================

eval:
  rounds:
    - round: 1
      closure_check:
        user_decisions_honored:
          - id: D1
            verified: true
            evidence: |
              paired_bootstrap_delta uses one rng.integers(0, n,
              size=n) call per resample and applies the same idx to
              both vectors — true paired bootstrap. n_resamples
              defaults to 10000, seed 42, ci 0.95 per spec §4.7.
              Verified by reading bootstrap.py:53-65.
          - id: D2
            verified: true
            evidence: |
              render_phase_diagram(over_budget_threshold=1.2)
              default; marker fill is 'none' iff
              cell.over_budget_factor > 1.2. Test
              test_render_writes_pdf_and_returns_path constructs
              a cell with over_budget=1.5 to exercise the open
              branch.
          - id: D3
            verified: true
            evidence: |
              No round-by-round trajectory code in
              analysis_phase/. The 6 source files contain no
              dialogue-replay logic; characterize.py docstring
              explicitly notes "Round-by-round trajectory is OUT
              OF SCOPE".
          - id: D4
            verified: true
            evidence: |
              docs/reports/final-report.tex contains 6 \IfFileExists
              blocks (one per included artifact). Verified by grep
              + the test test_report_tex_uses_iffileexists_guards
              asserting >= 5.
          - id: D5
            verified: true
