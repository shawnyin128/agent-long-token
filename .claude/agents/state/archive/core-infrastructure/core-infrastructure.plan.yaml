  optimization:
    suggestions:
      - loc: agentdiet/llm_client.py:LLMClient._append_cache
        what: |
          Currently writes line-by-line with per-call fsync. Acceptable for
          serial research use, but Day 1 PM full collection (100 dialogues × 9
          turns = 900 calls) will issue 900 fsyncs. Consider batching fsync
          to once per dialogue if collection feels sluggish on the target
          disk. Not a blocker.
      - loc: agentdiet/dataset.py
