          parse_answer's last-number fallback can misfire on long agent
          outputs that happen to end with a citation like "see equation
          (3)". Low probability on GSM8K where outputs are reasoning text
          ending in a numeric answer, but worth revisiting when
          debate-runner lands real outputs. Add failure-mode logging
          (log unparseable outputs to failures/) as part of
          full-collection feature, not here.
      - loc: tests/core_infrastructure/test_llm_client.py
