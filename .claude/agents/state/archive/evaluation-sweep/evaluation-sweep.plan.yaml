# GENERATOR section
# ============================================================

execution:
  S1:
    status: done
    confidence: 93
    notes: |
      count_tokens uses TOKENS_PER_CHAR=0.25 (round to int). PerQuestionResult
      and MethodSummary pydantic models with MethodSummary.build classmethod
      aggregating per-question rows + validating method consistency.
    commits: []
  S2:
    status: done
    confidence: 90
    notes: |
      evaluate_method_on_qid calls compress.apply for method→history,
      builds synthesizer-prompt user turn via EVAL_USER_TEMPLATE, sends
      through llm_client, parses answer, returns PerQuestionResult
      with compressed_tokens from count_tokens on the history string.
    commits: []
  S3:
    status: done
    confidence: 88
    notes: |
      run_sweep takes a `loader` callable for injectability. Iterates
      (qid × 5 methods), aggregates per-method, and runs 4 sanity
      invariants via _check_invariants (recorded, not raised).
    commits: []
  S4:
    status: done
    confidence: 88
    notes: |
      cli/evaluate.py with --n, --policy-path, --dry-run, --report.
      _fs_loader tries to load signal_scores from
      analysis/signal_scores.parquet (optional). Writes results.json
      atomically with a config block so post-hoc audits know which
      policy+seed the run used.
    commits: []
  S5:
    status: done
    confidence: 92
    notes: |
      Makefile evaluate/evaluate-report/evaluate-clean targets.
      README section with 4-invariant list, metrics definitions, and
      TOKENS_PER_CHAR approximation note.
    commits: []

unplanned_changes:
  - loc: agentdiet/cli/evaluate.py
    what: |
      Added a signal_scores.parquet loader branch in _fs_loader so
      the 'ours' policy can use drop_low_novelty / drop_unreferenced
      end-to-end without a separate signal_scores kwarg on the CLI.
    reason: |
      The analyze CLI writes signal_scores.parquet; wiring it in here
      avoids a duplicate CLI flag and keeps the runbook
      (analyze → evaluate) straightforward.
    confidence: 88
  - loc: agentdiet/evaluate.py
    what: |
      run_sweep's `loader` callable parameter — tests inject fixtures
      while CLI injects the filesystem loader. Kept orthogonal.
    reason: |
      Test ergonomics + separation of concerns (evaluator logic vs
      filesystem layout).
    confidence: 92

flags_for_eval:
  - |
    Invariant token_b1 >= token_b3 must hold structurally for every
    dialogue (b3 keeps a subset of messages, with same format). Worth
    locking via an explicit test.
  - |
    run_sweep takes policies as a dict, not a positional arg. If a
    caller forgets 'ours' the KeyError message should name the missing
    keys (currently does).
  - |
    CLI exit-code ordering: exit 1 on empty subset happens BEFORE
    policy-path check, so a user with no data never sees the
    policy-missing error. Confirm this is the intended precedence.

