plan_id: tolerate-latex-escapes-in-claim-json
iteration: 1
based_on: docs/design-docs/2026-04-21-multi-agent-debate-claim-analysis-design.md

problem: |
  Real Qwen claim-extraction run on 100 GSM8K dialogues: 230/900
  (25.6%) messages failed. Sampled 50 failure files — 49 have the
  same root cause: LLM emits LaTeX ('\(' '\[' '\frac' '\text') inside
  quote strings. JSON spec rejects these as invalid escapes and
  json.loads refuses the whole payload. Retry is the same prompt + Qwen
  produces the same LaTeX so retry also fails.

  The LLM's intent is a literal backslash followed by a letter, which
  in JSON should be encoded as '\\('. Pre-processing the raw response
  to convert invalid \X escapes to \\X makes the payload JSON-valid
  and the decoded string matches the LLM's intended quote character
  string (str.find against message_text will succeed because message
  text also has literal '\('). Fix must not touch valid JSON escapes.

steps:
  - id: S1
    desc: _fix_json_escapes helper
    approach: |
      Add _fix_json_escapes(raw: str) -> str in extract_claims.py.
      Implementation: regex replaces '\X' where X is NOT in the JSON-
      legal escape set {", \, /, b, f, n, r, t, u} with '\\X'.
      Important: run OUTSIDE existing '\\' sequences — we must not
      double-escape already-legal '\\' or '\"'. The cleanest way is
      a single regex with negative lookbehind OR a tokenizer pass
      over the string. Chose: process via re.sub with a function
      that counts consecutive backslashes to decide.
      Simpler: re.sub(r'\\([^\"\\/bfnrtu])', r'\\\\\\1', raw) —
      this matches exactly one backslash followed by a non-escape
      char, and replaces with two backslashes + that char.
      Guard: if the match lands inside an already-doubled '\\' run,
      we should leave it alone. Test covers this.
    files:
      create: []
      modify: [agentdiet/extract_claims.py]
      test: [tests/tolerate_latex_escapes/test_fix_json_escapes.py]
    test_plan:
      - '\(' -> '\\('
      - '\[' -> '\\['
      - '\frac' -> '\\frac'
      - '\times' -> '\\times'
      - valid '\"' (quote inside string) UNCHANGED
      - valid '\\' (backslash-backslash) UNCHANGED
      - valid '\n' '\t' UNCHANGED (these are legal JSON escapes)
      - valid '\uXXXX' UNCHANGED
      - real raw response from failure file gsm8k-test-592 parses successfully after fix

  - id: S2
    desc: integrate into _parse_claims_payload
    approach: |
      In _parse_claims_payload: after _strip_json_fences(raw), call
      _fix_json_escapes(stripped) BEFORE json.loads. Keep error
      message shape identical.
    files:
      create: []
      modify: [agentdiet/extract_claims.py]
      test: [tests/tolerate_latex_escapes/test_integration.py]
    test_plan:
      - DummyBackend returning the exact raw_response from a real
        failure file now produces claims (length > 0), extraction_failed=False
      - Retry is NOT triggered for the LaTeX case (pre-processing fixed it on first pass)
      - Raw output without backslashes still parses identically (no regression)

  - id: S3
    desc: runbook note
    approach: |
      README Gate-1 troubleshooting block already mentions 'make reparse'
      for the parser fix. Add a sibling note under extract-report
      troubleshooting: "If extraction_failed rate is high, check
      artifacts/failures/claim_extraction/*.json reason field. LaTeX
      escape errors are auto-handled after this fix — run
      `make extract-clean && make extract` to re-parse cached LLM
      responses with the updated parser."
    files:
      create: []
      modify: [README.md]
      test: [tests/tolerate_latex_escapes/test_runbook.py]
    test_plan:
      - README mentions 'extract-clean && extract' recovery flow

decisions:
  - id: D1
    question: Regex scope — only invalid \X, or also inside string literals only?
    planner_view: whole-string-invalid-escape-only
    confidence: 88
    rationale: |
      The LaTeX pattern only ever appears inside JSON string literals
      (because it lives in the "quote" field). Scanning string-by-
      string via a JSON-aware tokenizer is overkill — our input is
      known to be a JSON array, and outside of strings there shouldn't
      be any backslashes at all (no Windows paths, no regex). Whole-
      string sub of invalid \X is safe and trivially fast.
    alternatives:
      - option: full JSON-string-aware tokenizer
        rejected_because: Overengineering for a two-line fix.
      - option: try json.loads, on fail apply regex and retry
        rejected_because: Identical behavior for valid JSON, just
          more branches. Always-fix is cleaner.
    ask_user: false
    user_decision: null

  - id: D2
    question: How to recover 230 existing failures — re-extract or dedicated CLI?
    planner_view: extract-clean-then-rerun-uses-LLM-cache
    confidence: 92
    rationale: |
      All 900 LLM responses are in artifacts/llm_cache.jsonl keyed by
      sha256(model, temp, messages). Running `make extract-clean` drops
      only artifacts/claims/, keeping the LLM cache. `make extract`
      replays every message through the new parser against the cached
      raw responses — zero new LLM calls. Simpler than a dedicated
      re-parse CLI for claims.
    alternatives:
      - option: add cli/reextract_failures.py reading failure files
        rejected_because: Extra CLI to maintain for a one-time recovery.
    ask_user: false
    user_decision: null

# ============================================================
# GENERATOR section
# ============================================================

execution:
  S1_and_S2:
    status: done
    confidence: 93
    notes: |
      _fix_json_escapes() in extract_claims.py uses a run-length-aware
      scan: for each run of consecutive backslashes, if the run is odd
      AND the next char is not in {",\,/,b,f,n,r,t,u} AND not EOF,
      prepend one extra backslash. This correctly handles \\frac
      (even run → leave) vs \frac (odd run + illegal → promote to
      \\frac). Integrated into _parse_claims_payload before json.loads.
      Verified on real failure gsm8k-test-592_r3_a1: 0 claims → 7
      claims after fix.
    commits: ["<pending>"]
  S3:
    status: done
    confidence: 95
    notes: |
      README extract-report section adds troubleshooting block
      documenting LaTeX-escape root cause and the extract-clean &&
      extract recovery flow.
    commits: ["<pending>"]

unplanned_changes: []

flags_for_eval:
  - |
    Only ran the fix against one real failure file sample. Remaining
    181 unsampled failure files are assumed to be the same root cause
    but not verified individually. HPC side will confirm via
    `make extract-clean && make extract` outcome.
  - |
    _fix_json_escapes operates on the whole raw string, not scoped to
    JSON string literals. If the LLM ever emits a bare backslash
    OUTSIDE a string (which would already be invalid JSON), this
    pre-processor would add another backslash, potentially leaving
    the payload in a worse state. Acceptable risk — LLM output is
    almost always "one JSON value per response" and backslashes only
    live inside strings.

