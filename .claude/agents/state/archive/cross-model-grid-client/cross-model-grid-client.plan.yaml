unplanned_changes:
  - loc: agentdiet/llm_client.py
    what: |
      Added _invoke_backend helper inside LLMClient that does a
      getattr-based fallback from chat_full to chat, plus a TypeError
      fallback inside chat for legacy backends that don't accept
      thinking/top_p kwargs.
    reason: |
      Existing tests in tests/full_collection and tests/pilot_gate1
      use FakeBackend classes that only define chat(messages, model,
      temperature). Without the fallback, LLMClient.chat (now routed
      through chat_full) would AttributeError or TypeError on those
      tests. Two prior tests went from passing to failing in the
      first run; the fallback restored both.
    confidence: 85
  - loc: agentdiet/llm_client.py
    what: |
      Added TOKENS_PER_CHAR=0.25 and _approx_tokens / _approx_prompt_tokens
      module-private helpers used to fill ChatResult tokens on cache hits.
    reason: |
      Plan called for char-approximation on cache hits to avoid None
      tokens propagating to callers. Helpers are module-private and
      mirror agentdiet.evaluate.count_tokens.
    confidence: 95

flags_for_eval:
  - cache_key conditional payload — the hash includes thinking only
    when True and top_p only when != 1.0. Confirm test
    test_cache_key_default_args_match_legacy still asserts that and
    inspect cache_key for any other parameters that should also be
    conditional.
  - DummyBackend.responder accepts (msg, model, temp) OR
    (msg, model, temp, **kw) — the chat() method TypeError-falls-back
    to the no-kwargs form. Verify both shapes work in all 3 call
    paths (legacy chat, new chat with thinking, new chat_full).
  - run_voting "Sample id: K" nonce — make sure no caller of
    run_voting embeds question text that itself starts with
    "Sample id:" (would collide with the prefix). Spec doesn't
    forbid this but a sanity test could make it explicit.
  - The 4 pre-existing test failures in tolerate_latex_escapes /
    type_level_ablation persist; they are unrelated to this feature.

