plan_id: cross-model-grid-client
iteration: 1
based_on: docs/design-docs/2026-04-27-debate-phase-mapping-design.md

problem: |
  Local half of the original cross-model-grid feature: extend
  agentdiet/llm_client.py to support thinking-mode toggling
  (Qwen3 enable_thinking and GPT-OSS reasoning_effort, exposed
  uniformly as thinking: bool) with per-(model, thinking, top_p)
  cache partitioning, then add agentdiet/voting.py with the
  token-matched majority-voting (self-consistency) baseline per
  spec §5.3 — pure calibrate_n() + run_voting() functions, no CLI.
  HPC vLLM stand-up moved to cross-model-grid-hpc-serving.

steps:
  - id: S1
    desc: extend llm_client with thinking + ChatResult with usage
    approach: |
      Add `thinking: bool = False` parameter to Backend.chat protocol
      and to LLMClient.chat. Cache key extended to include thinking
      and top_p so existing cache keys (with thinking=False, top_p=1.0)
      stay valid: cache_key(model, temperature, messages, thinking=False,
      top_p=1.0) MUST equal the legacy 3-arg key for back-compat.
      Add a ChatResult dataclass {response: str, prompt_tokens: int,
      completion_tokens: int}. Add LLMClient.chat_full() returning
      ChatResult; the existing chat() keeps its str return for
      back-compat. OpenAIBackend gains a model_family: Literal["qwen3",
      "gpt-oss", "generic"] = "generic" __init__ param. Translation
      table:
        - family="qwen3" + thinking=True  -> extra_body={"chat_template_kwargs":
                                            {"enable_thinking": True}}
        - family="qwen3" + thinking=False -> extra_body={"chat_template_kwargs":
                                            {"enable_thinking": False}}
        - family="gpt-oss" + thinking=True/False -> reasoning_effort="high"/"low"
        - family="generic" -> thinking ignored (warn-once on True)
      Token counts come from response.usage when present (live calls).
      For cache hits, fill ChatResult with char-based approximation
      using TOKENS_PER_CHAR=0.25 (matching evaluate.count_tokens) so
      callers always receive non-None integers.
    files:
      create: []
      modify:
        - agentdiet/llm_client.py
      test:
        - tests/cross_model_grid_client/test_llm_client_thinking.py
    test_plan:
      - cache_key(model, temp, messages) defaults match
        cache_key(model, temp, messages, thinking=False, top_p=1.0)
        — old cache entries remain valid
      - thinking=True and thinking=False produce different cache keys
        for same (model, temp, messages, top_p)
      - top_p=0.95 vs top_p=1.0 produce different cache keys
      - chat_full returns ChatResult with prompt_tokens / completion_tokens
        populated from a synthetic backend's reported usage
      - cache hit returns ChatResult with non-None token counts even
        when usage was None when the entry was stored (char approx)
      - OpenAIBackend(model_family="qwen3", thinking=True) issues
        request with chat_template_kwargs.enable_thinking=True
        (mock at the OpenAI SDK boundary)
      - OpenAIBackend(model_family="gpt-oss", thinking=True/False)
        issues request with reasoning_effort="high"/"low"
      - OpenAIBackend(model_family="generic", thinking=True) emits
        a single warning and ignores the flag
    coverage_min: 85

  - id: S2
    desc: voting.py with calibrate_n + run_voting + over_budget logging
    approach: |
      New module agentdiet/voting.py.

      calibrate_n(debate_token_counts: list[int],
                  sa_token_counts: list[int]) -> CalibrationResult:
        - mean_debate = sum/len; mean_sa = sum/len
        - N_raw = ceil(mean_debate / mean_sa)
        - N = max(N_raw, 3); floor_active = (N_raw < 3)
        - over_budget_factor = (N * mean_sa) / mean_debate
        - returns dataclass CalibrationResult with all six fields
        - raises ValueError if either input is empty or any count <= 0

      run_voting(question: str,
                 n_samples: int,
                 llm_client: LLMClient,
                 model: str,
                 system_prompt: str,
                 temperature: float = 0.7,
                 top_p: float = 0.95,
                 thinking: bool = False,
                 parser: Callable[[str], str|None] = parse_answer,
                 ) -> VotingResult:
        - For k in 0..n_samples-1, build messages =
            [{"role":"system","content":system_prompt},
             {"role":"user","content":f"Sample id: {k}\n\n{question}"}]
          and call llm_client.chat_full(messages, model, temperature,
          thinking=thinking, top_p=top_p).
        - Collect responses, parse each, run agentdiet.aggregate.majority_vote
          on synthetic Messages constructed with agent_id=k, round=1.
        - Sum prompt_tokens + completion_tokens across calls into
          total_tokens.
        - Return VotingResult{samples, parsed_answers, final_answer,
          total_tokens}.

      Both dataclasses use @dataclass(frozen=True) so they serialize
      via dataclasses.asdict to JSON cleanly. The caller (a future
      thinking-axis-grid CLI) writes artifacts/sc_calibration_{cell}.json.

      Backend.chat protocol gains top_p: float = 1.0. OpenAIBackend
      forwards top_p when temperature > 0; ignores it when temperature
      == 0 (vLLM tolerates it but it's a no-op). DummyBackend simply
      records it.
    files:
      create:
        - agentdiet/voting.py
      modify:
        - agentdiet/llm_client.py
      test:
        - tests/cross_model_grid_client/test_voting.py
    test_plan:
      - calibrate_n on (debate=[3000]*10, sa=[300]*10) gives N_raw=10,
        N=10, floor_active=False, over_budget_factor=1.0
      - calibrate_n on (debate=[3000]*10, sa=[2500]*10) gives
        N_raw=2, N=3, floor_active=True, over_budget_factor>1
      - calibrate_n raises ValueError on empty inputs
      - calibrate_n raises ValueError on any zero/negative count
      - run_voting on a DummyBackend whose responder returns
        f"#### {k}" for sample k yields a parsed_answers list of
        n_samples distinct integers, final_answer is one of them,
        total_tokens is the sum of per-call usages
      - run_voting with n_samples=1 returns the single sample's
        parsed answer (degenerate but well-defined)
      - run_voting with n_samples=3 and all responses agreeing
        returns that agreed answer
      - run_voting forwards thinking=True through to chat_full
        (verify by spying on the DummyBackend's call args)
    coverage_min: 85

  - id: S3
    desc: integration tests for thinking + calibration determinism
    approach: |
      Cross-cutting tests beyond per-step coverage:
        - Toggle round-trip: same (model, temp, messages, top_p)
          with thinking=True followed by thinking=False stores 2
          distinct cache entries; reading back returns the right
          response per toggle.
        - Calibration determinism: calibrate_n(same_input) is
          referentially transparent across 100 invocations.
        - End-to-end mini composition: build a DummyBackend that
          returns usage proportional to len(messages_json); run
          run_voting(n=5) collecting per-call token totals; pass the
          observed total_tokens (split across 5 calls) into
          calibrate_n alongside synthetic debate token counts; assert
          the recomputed over_budget_factor matches an externally
          calculated value within 1e-9.
    files:
      create: []
      modify: []
      test:
        - tests/cross_model_grid_client/test_thinking_integration.py
        - tests/cross_model_grid_client/test_calibration_determinism.py
    test_plan:
      - toggle round-trip produces 2 entries in cache
      - calibrate_n is deterministic (100 trials, identical output)
      - run_voting + calibrate_n composition yields expected
        over_budget_factor numerically
    coverage_min: 80

decisions:
  - id: D1
    question: |
      How should the HPC stand-up steps be handled?
    planner_view: |
      Split — done. Original cross-model-grid feature replaced by:
        - cross-model-grid-client (this plan): S1+S2+S3 above
        - cross-model-grid-hpc-serving: HPC scripts + smoke runs
      thinking-axis-grid depends on both halves.
    confidence: 100
    rationale: |
      User chose split-features. Local code can pass and unblock
      voting.py-dependent unit tests before HPC GPU time is scheduled.
    alternatives:
      - option: keep-HPC-in-feature
        rejected_because: User chose split.
      - option: drop-HPC
        rejected_because: User chose split.
    ask_user: false
    user_decision: split-features

  - id: D2
    question: |
      OpenAIBackend extension shape: subclass per family
      (Qwen3VLLMBackend, GPTOSSVLLMBackend) vs. single OpenAIBackend
      with model_family parameter that branches in chat()?
    planner_view: |
      Single OpenAIBackend with model_family: Literal["qwen3",
      "gpt-oss", "generic"] constructor parameter.
    confidence: 75
    rationale: |
      Two families differ in 2-3 keys of extra_body — too thin to
      justify subclass overhead. Branching is small and confined.
      Extension to a third family is a one-line addition to the
      Literal + one branch.
    alternatives:
      - option: subclass-per-family
        rejected_because: |
          Two subclasses for ~5 lines each; encourages mock-isolation
          by family which slows tests.
    ask_user: false
    user_decision: null

  - id: D3
    question: |
      Token counting source in chat_full: real OpenAI response.usage
      vs. char-based approximation (TOKENS_PER_CHAR=0.25)?
    planner_view: |
      Read response.usage when present (live calls). Cache stores
      response text only; on cache hit, fill ChatResult tokens with
      the char approximation so callers never see None.
    confidence: 85
    rationale: |
      Real tokens for live calls, cheap fallback for cache hits.
      Avoids a JSONL cache schema migration.
    alternatives:
      - option: store-usage-in-cache
        rejected_because: Schema change to llm_cache.jsonl breaks back-compat.
      - option: char-only
        rejected_because: Loses real tokens during calibration where they matter most.
    ask_user: false
    user_decision: null

  - id: D4
    question: |
      voting.py scope — include end-to-end CLI or stop at run_voting +
      calibrate_n functions?
    planner_view: |
      Stop at the functions. CLI orchestration belongs in
      thinking-axis-grid.
    confidence: 90
    rationale: |
      Matches the feature's scope; CLI was never a feature step. The
      CLI also needs dataset loaders (evalscope) owned by
      coding-eval-infra.
    alternatives:
      - option: include-CLI
        rejected_because: Scope creep + cross-feature dependency violation.
    ask_user: false
    user_decision: null

  - id: D5
    question: |
      How to force n_samples deterministically-different responses
      under temperature=0.7?
    planner_view: |
      Append "Sample id: K\n\n" to the user message for k in 0..n-1.
      Different messages -> different cache keys -> independent samples
      reproducibly.
    confidence: 80
    rationale: |
      Simplest deterministic-diversity mechanism. Nonce is explicit
      in the cache so calibration logs are reproducible.
    alternatives:
      - option: pass-seed-to-backend
        rejected_because: |
          OpenAI/vLLM seed is per-request and would not survive cache
          reuse cleanly.
      - option: temp-only-no-nonce
        rejected_because: |
          temp=0.7 with same prompt + same provider seed often returns
          the same string on vLLM — n=8 would collapse to n=1.
    ask_user: false
    user_decision: null

