flags_for_eval:
  - HumanEval+ docstring extraction is regex-based on `>>> name(...)`
    patterns followed by an expected-result line. Real evalplus
    prompts may have multi-line examples or odd formatting that the
    parser misses. Acceptable: public tests aren't exhaustive — the
    canonical hidden_tests block is.
  - SubprocessJudge does NOT block filesystem access outside CWD;
    user code can read /etc/passwd if it wants. Spec §5.4 says "no
    network, no shared filesystem outside the dir" — we satisfy CWD
    isolation but not full FS isolation. Real production runs should
    use EvalscopeJudge once its harness is pinned (which DOES sandbox
    fully). Note this in the README.
  - parse_code_message returns ("", "") on missing sections, but a
    well-formed message with notes only and no code is ambiguous —
    is that a parse failure or "agent gave up on coding this round"?
    Currently treated as parse failure (empty code). Callers should
    log when parsed code is empty.
  - cluster_by_signature ties broken by smallest-lex signature; spec
    only said deterministic. Acceptable choice but document the
    direction in the README so a downstream debugger isn't surprised.

