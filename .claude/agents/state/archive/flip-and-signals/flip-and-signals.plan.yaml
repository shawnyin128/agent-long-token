unplanned_changes:
  - loc: agentdiet/analysis/signals.py
    what: |
      HashingFakeEmbedder maps uint8 bytes to signed floats (centered
      at -127.5) before L2-normalization. Without this, all vectors
      share a strong positive correlation and distinct texts show
      high cos sim, breaking novelty semantics.
    reason: |
      Discovered via failing test_distinct_later_claim_has_high_novelty.
      Root cause is that uniform-positive bytes never approach
      orthogonality under cosine sim; signed centering fixes it while
      preserving determinism.
    confidence: 90
  - loc: agentdiet/cli/analyze.py
    what: |
      Added `qids_skipped_no_claims` manifest counter (dialogues that
      exist without a matching claims artifact — surfaces partial
      extraction gaps that would otherwise silently drop coverage).
    reason: |
      Not specified in the plan but essential for the Day-2 runbook:
      tells the user how many qids are excluded from analysis.
    confidence: 90

flags_for_eval:
  - |
    FlipEvent round validation rejects round=1 but allows large
    arbitrary integers. Confirm this is correct (no upper bound
    needed since debates are bounded by n_rounds in cfg).
  - |
    _select_embedder's _ensure call eagerly imports sentence-
    transformers at CLI startup when --embedder real is used. This
    makes every real-embedder invocation pay the import cost even
    if no dialogues are eligible. Confirm this is acceptable (the
    exit-1 path runs AFTER run_analysis so it would import).
  - |
    Parquet writing uses BufferOutputStream in-memory before atomic
    rename. For 100-dialogue runs (~3000 rows × 6 cols) this is
    fine; verify memory is not a concern for much larger scales.
  - |
    compute_signals returns rows in sort order (round, agent_id, id).
    If downstream expects original claim order, they must re-sort.
    Confirm this is documented or not a concern.

