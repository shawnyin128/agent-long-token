flags_for_eval:
  - verify gate.py exit codes actually exit with those codes at CLI invocation (not just from build_report)
  - verify pilot CLI handles model switching correctly (artifacts under model_slug; same cache works for both)
  - verify wait_healthy polls the correct URL when AGENTDIET_BASE_URL is set to something nonstandard
  - verify pilot resume properly skips BOTH single and debate independently (e.g. single exists but debate doesn't)
  - spot-check that the sample-section picker works when fewer than 3 of the three sample types exist
  - confirm Makefile 'serve' target does not start vLLM during `make -n` dry run (test uses -n)

