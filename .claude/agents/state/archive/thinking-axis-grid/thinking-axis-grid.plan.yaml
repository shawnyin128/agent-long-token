    what: |
      Added GSM8KDataset thin wrapper that calls load_gsm8k(n=80,
      seed=42, cache_dir) and exposes it under the Dataset Protocol.
    reason: |
      Required by D6 in plan to keep CLI dispatch table uniform
      across all 4 datasets. Plan listed this in S4's approach but
      not in its files.create list.
    confidence: 95
  - loc: agentdiet/debate/__init__.py
    what: |
      Switched run_debate's LLM call from chat() to chat_full() and
      added thinking kwarg (default False, back-compat). Token totals
      now accumulate into Dialogue.meta.total_prompt_tokens /
      total_completion_tokens.
    reason: |
      D4 in the plan already authorized this. Listed as planned in
      S2's modify list, calling out here for emphasis since it
      changes a core API.
    confidence: 90

flags_for_eval:
  - "Math debate now uses chat_full instead of chat. Existing
     DummyBackend test fixtures relied on the chat() interface; the
     LLMClient _invoke_backend fallback handles the migration but
     should be re-verified by re-running the debate-runner suite as
     part of regression."
  - "Code voting condition uses an identity parser (lambda text: text)
     so the raw response is preserved for downstream code extraction
     + judging. This means voting.run_voting's internal majority_vote
     sees raw responses as 'parsed answers' which would never agree —
     so the VotingResult.final_answer is meaningless for code; we
     don't use it. The cluster_by_signature step is the actual
     aggregator. Worth confirming this layered design is robust."
  - "Resume detection is purely path-presence: any sa.json on disk
     wins, even if it was written by a different code version. No
     schema-version stamp on records yet. If the orchestrator's
     output schema ever changes mid-experiment, stale artifacts will
     deserialize wrong. Acceptable for now (single experiment, fixed
     schema) but worth a TODO if the grid runs span weeks."
  - "calibration_prefix is configurable (default 10) but the spec
     §5.3 hardcodes 10. Verify the default is honored when no flag
     is passed."
  - "Token totals from voting.run_voting come back as one bucket
     (total_tokens) — the per-condition record stores them in
     QuestionResult.total_tokens with prompt_tokens=0 and
     completion_tokens=0. Test_e2e_token_totals_match_aggregation
     confirms the row sum matches the record sum, but the
     prompt/completion split is empty for voting rows."

