      required-filter check for ours.
    commits: ["2b1fbca"]
  S2:
    status: done
    confidence: 90
    notes: |
      _apply_b1/_apply_b2/_apply_b3/_apply_b5 implemented with shared
      format_history. b5 uses seeded random.Random(seed) with policy
      seed taking precedence over apply's random_seed fallback.
    commits: ["fd4ec51"]
  S3:
    status: done
    confidence: 90
    notes: |
      _apply_ours computes union of drop_types, drop_low_novelty,
      drop_unreferenced via _mask_claims_by_predicate. Skip behavior
      for claims lacking signal rows: claim survives (no row means no
      data to judge on).
    commits: ["ed1dd97"]
  S4:
    status: done
    confidence: 90
    notes: |
      Sample policy.json at docs/policy.sample.json (moved from
      artifacts/ because that path is gitignored). Makefile
      policy-sample target uses cp -n (no-clobber) so user edits
      survive re-runs. README section added with 5-mode table.
    commits: ["cfb5cbe"]

unplanned_changes:
  - loc: agentdiet/compress.py
    what: |
      _apply_ours: empty signal_scores list is a NO-OP filter (skips
      signal-based filters silently), not an error. Original impl
      treated empty same as None and raised. Change follows adversarial
      test finding — partial-signal availability shouldn't crash.
    reason: |
      More forgiving for per-qid runs where some dialogues have
      complete signals and others don't. Explicit None still errors
      so a pure coding mistake is still caught.
    confidence: 88
  - loc: docs/policy.sample.json
    what: |
      Sample policy located under docs/ not artifacts/compression/
      because the latter is gitignored.
    reason: |
      Git-tracked sample needs a tracked path; docs/ is the natural
      home for template files.
    confidence: 95

flags_for_eval:
  - |
    Policy mode validation: b3 with last_k=None falls through to
    default 1 via model_validator. Confirm this works for
    model_validate_json on a payload missing last_k.
  - |
    b5 seed precedence: Policy.random_seed wins over apply(random_seed=).
    Verify that a policy loaded from JSON with random_seed set behaves
    identically to the same policy constructed in Python.
  - |
    docs/policy.sample.json must round-trip through
    Policy.model_validate_json (test locks this).
  - |
    ours with drop_unreferenced=False vs None: must be equivalent to
    "no filter" and REQUIRE another filter. Test locks this.

