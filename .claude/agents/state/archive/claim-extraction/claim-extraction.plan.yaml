  optimization:
    suggestions:
      - loc: agentdiet/extract_claims.py
        what: |
          Per-message silent claim drops (invalid type, empty quote,
          quote-not-found) are not currently logged. Consider writing a
          per-dialogue "extraction_drops.jsonl" trace so Day-2 analysis
          can compute the true drop rate for the 10-dialogue spot check.
      - loc: agentdiet/cli/extract.py
        what: |
          Manifest lives at artifacts/claims/manifest.json (not
          inside {model_slug}/), mirroring collect.py. If the user ever
          runs extraction against two models, the second manifest
          overwrites the first. Low-cost fix: move to
          artifacts/claims/{model_slug}/manifest.json.
      - loc: agentdiet/extract_claims.py
        what: |
          str.find returns the first occurrence of quote; if the same
          quote appears twice in the message the earlier span wins. Add
          a doc-string note (already behaviorally covered by tests).
      - loc: agentdiet/cli/spot_check.py
        what: |
          Markdown companion dumps message text inside triple-backtick
          fences. A message that itself contains "```" would break the
          fence. Escape or use indented code blocks if a real dialogue
          trips this.
    final_verdict: MERGE_READY


