unplanned_changes:
  - loc: agentdiet/extract_claims.py
    what: |
      Added _strip_json_fences helper to tolerate ```json fenced
      responses — some vLLM builds wrap JSON even when instructed
      otherwise.
    reason: |
      Defensive against a known vLLM quirk; one-line stripper
      avoids wasting a retry on a trivially fixable format issue.
    confidence: 85
  - loc: agentdiet/cli/extract.py
    what: |
      dialogue-level load guarded by try/except so a corrupt JSON file
      becomes a "failed" outcome rather than aborting the whole run.
    reason: |
      Matches full-collection CLI resilience; spec §6.1 calls for
      fail-visible, not fail-fast-on-first-IO-error.
    confidence: 90
  - loc: agentdiet/cli/spot_check.py
    what: |
      Added "quoted_source" column to spot_check.csv — re-renders the
      actual substring from the dialogue text for the given span. Makes
      the human review faster and lets D2 (span correctness) be
      audited alongside type correctness.
    reason: |
      Plan said "record to CSV with pass/fail notes" but did not
      specify columns; quoted_source is a cheap and high-leverage
      addition for the human reviewer.
    confidence: 88

flags_for_eval:
  - |
    Coverage of _parse_claims_payload: verify the "quote found by
    str.find but at byte offset that spans a multi-byte character"
    case is either impossible (Python str.find returns code-point
    offsets so should be safe) or tested.
  - |
    Resume correctness: run_extraction skips qids whose claims file
    exists. Confirm this holds even when the prior run produced a
    "partial" outcome — partials SHOULD be cached and not re-extracted
    on the next run (otherwise we lose resumability).
  - |
    Exit code 1 semantics: currently only triggers on dialogue-level
    failures. Verify this matches what downstream CI/scripts expect.
  - |
    Spot-check deterministic sample: confirm seeded RNG uses
    cfg.seed (default 42), not random.seed globally — a global
    mutation could corrupt other code paths that share Random state.

