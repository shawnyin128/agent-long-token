unplanned_changes:
  - loc: tests/debate_runner/test_smoke.py
    what: removed test_cli_no_dry_run_exits_nonzero
    reason: asserted stub behavior "not yet implemented" that is replaced by real collection in this feature
    confidence: 95
  - loc: agentdiet/cli/collect.py manifest location
    what: manifest written to artifacts/dialogues/manifest.json (not under model_slug)
    reason: manifest spans collection attempts across model switches via --report-manifest; keeping it at top-level of dialogues/ avoids stale pointers when user changes AGENTDIET_MODEL
    confidence: 85

flags_for_eval:
  - verify run_collection on a mix of (ok | unparsed | failed) does not skip any qid and counts all correctly
  - verify resume skip semantics when some qids have artifacts AND some don't
  - verify --report-manifest exits 0 even when the manifest indicates all-failed (distinguish reading from running)
  - verify the README HPC section references only commands that actually exist in Makefile
  - confirm that atomic_write never leaves an empty or partial JSON file on disk in any test path
  - confirm no regressions in pilot tests (pilot.py was NOT touched this feature but shares the cache + config layer)

