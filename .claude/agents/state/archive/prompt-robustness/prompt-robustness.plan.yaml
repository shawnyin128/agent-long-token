flags_for_eval:
  - "Symmetric variant collapses round-1 cache hits because all 3
     agents have identical (system, user) message pairs at temp=0.
     Test_run_debate_q_math_total_tokens_positive_under_each_variant
     handles this — 135-token strict equality only on cooperative /
     adversarial-strict; symmetric just asserts > 0. Real HPC runs
     with usage from a live backend may show smaller token totals
     for symmetric than the other two variants, which is expected."
  - "Cell directory naming. cell_dir() branches on prompt_variant
     == 'cooperative' to preserve legacy paths. If a future variant
     name happens to be 'cooperative' (it shouldn't), or if the
     default is renamed, the regression guard breaks. Locking
     PROMPT_VARIANT_NAMES would catch this."
  - "Voting baseline still uses SOLVER_PROMPT regardless of variant
     per D5; this is the intended scope for the sub-grid (variant
     only changes debate). Cross-variant Δ comparison is left to
     phase-mapping-analysis."

