plan_id: prompt-robustness
iteration: 1
based_on: docs/design-docs/2026-04-27-debate-phase-mapping-design.md

problem: |
  Spec §4.5 asks whether the SC-collapse pattern depends on prompt
  design. We need two new prompt variants beyond the existing
  cooperative one — adversarial-strict (skeptic must disagree;
  synthesizer must enumerate disagreement points) and symmetric
  (3 identical agents, no role differentiation) — plumbed through
  the grid runner so the user can run the 6-cell sub-grid
  (Qwen3 + GSM8K, 3 variants x thinking on/off) without manual
  prompt swapping. Without this, we can't tell whether the
  RQ0 collapse is a prompt-induced artifact or a regime-level
  property.

steps:
  - id: S1
    desc: agentdiet/prompts.py registry with 3 named variants
    approach: |
      New module agentdiet/prompts.py exposes:
        PROMPT_VARIANTS: dict[str, list[str]] mapping
          {"cooperative", "adversarial-strict", "symmetric"} to
          a list of three role-aligned system prompts (one per
          agent slot 0/1/2).

        cooperative: re-exports existing SOLVER_PROMPT,
          SKEPTIC_PROMPT, SYNTHESIZER_PROMPT from agentdiet.agents
          unchanged. This is the baseline for all RQ1 grids and
          must continue to give byte-identical strings.

        adversarial-strict: same role triplet, but with stricter
          obligations — skeptic prompt requires "you MUST identify
          at least one concrete disagreement with the proposer's
          solution, and explain why it is wrong"; synthesizer
          prompt requires "before resolving, enumerate every
          disagreement point you saw between the prior agents and
          state which side you favor on each".

        symmetric: 3 IDENTICAL prompts, all using the existing
          SOLVER_PROMPT. No role differentiation. This is the
          "diversity comes only from sampling noise" baseline; under
          temp=0 it is expected to converge to one answer.

      Module exposes get_variant(name: str) -> list[str] with a
      clear KeyError on unknown variant names.
    files:
      create:
        - agentdiet/prompts.py
        - tests/prompt_robustness/__init__.py
        - tests/prompt_robustness/test_prompts_registry.py
      modify: []
      test: []
    test_plan:
      - "PROMPT_VARIANTS has exactly the three documented keys"
      - "PROMPT_VARIANTS['cooperative'] equals
        [SOLVER_PROMPT, SKEPTIC_PROMPT, SYNTHESIZER_PROMPT] from
        agentdiet.agents (byte-identical, regression guard)"
      - "PROMPT_VARIANTS['adversarial-strict'] keeps role labels but
        contains the words 'disagreement' / 'enumerate' / 'wrong'
        in the appropriate slots"
      - "PROMPT_VARIANTS['symmetric'] is three IDENTICAL strings"
      - "get_variant('unknown') raises KeyError with helpful message
        listing valid names"
      - "every variant's prompts contain the FORMAT_INSTR shared
        constant so the parser keeps working"
    coverage_min: 95

  - id: S2
    desc: thread prompts through agents + run_debate + grid.runner
    approach: |
      agentdiet/agents.py: make_default_agents gains an optional
      prompts: list[str] | None kwarg. When None, behavior is
      identical to today (uses SYSTEM_PROMPTS by role). When a list
      is passed, agents are constructed with role labels still
      assigned by DEFAULT_ROLE_ORDER but system_prompt is taken
      from the passed list at index agent_id. This preserves Agent
      shape (id, role, system_prompt) so downstream code keeps
      working.

      agentdiet/debate/__init__.py: run_debate gains
      prompt_variant: str = "cooperative" kwarg. When passed, it
      resolves the variant via prompts.get_variant(prompt_variant)
      and forwards to make_default_agents. Existing callers don't
      pass it; they get cooperative — byte-identical to the prior
      behavior.

      agentdiet/grid/runner.py: run_debate_q_math forwards a new
      prompt_variant kwarg to run_debate. run_voting_q_math and
      run_sa_math keep using SOLVER_PROMPT regardless of variant
      (SA / voting are the comparison baselines, not "debate with
      different prompts").

      Why only math: spec §4.5 explicitly limits this sub-grid to
      Qwen3 + GSM8K. Code-domain prompts are out of scope.
    files:
      create: []
      modify:
        - agentdiet/agents.py
        - agentdiet/debate/__init__.py
        - agentdiet/grid/runner.py
      test:
        - tests/prompt_robustness/test_threading.py
    test_plan:
      - "make_default_agents() with no prompts kwarg produces
        identical Agent.system_prompt list to today (regression)"
      - "make_default_agents(prompts=['A','B','C']) produces three
        agents with system_prompt fields A/B/C"
      - "make_default_agents(prompts=['only-one']) when n_agents=3
        raises ValueError"
      - "run_debate without prompt_variant produces identical
        Dialogue.meta['roles'] as before"
      - "run_debate(prompt_variant='symmetric') gives every agent
        the same system_prompt; spy on backend.chat_full args to
        confirm"
      - "run_debate(prompt_variant='adversarial-strict') puts the
        adversarial skeptic prompt in slot 1; backend spy confirms"
      - "run_debate_q_math forwards prompt_variant kwarg to
        run_debate"
    coverage_min: 90

  - id: S3
    desc: CellSpec.prompt_variant + cell_dir + cli/grid.py flag
    approach: |
      agentdiet/grid/types.py: CellSpec gains
      prompt_variant: str = "cooperative" field. cell_dir keeps the
      old format when prompt_variant == "cooperative" (no breakage
      to existing artifacts/grid/{...}/ trees) and appends
      "__pv-{variant}" suffix otherwise. So
      "Qwen__Qwen3-30B-A3B__gsm8k__t0" stays the same for the main
      grid; sub-grid runs go to
      "Qwen__Qwen3-30B-A3B__gsm8k__t0__pv-adversarial-strict" /
      "...__pv-symmetric".

      agentdiet/cli/grid.py: parse_cell_spec accepts an optional
      4th colon-segment "model_family:dataset:thinking:variant"
      where variant defaults to "cooperative" if absent. CLI also
      adds --prompt-variant {cooperative,adversarial-strict,
      symmetric} as a global flag that applies to every --cell on
      that invocation when the spec itself doesn't include a 4th
      segment. Per-cell explicit variant in the spec wins over the
      global flag.

      A new --prompt-sub-grid shortcut expands to the 6-cell
      sub-grid: qwen3:gsm8k:0:cooperative, qwen3:gsm8k:1:cooperative,
      qwen3:gsm8k:0:adversarial-strict, qwen3:gsm8k:1:adversarial-strict,
      qwen3:gsm8k:0:symmetric, qwen3:gsm8k:1:symmetric. (Cooperative
      cells in the sub-grid will collide with the main grid's
      cooperative cells on disk, which is fine — the resume guard
      reuses them.)

      orchestrator.run_cell takes the cell.prompt_variant and
      forwards it to runner.run_debate_q_math via a stored
      attribute on CellSpec. SA + voting are not affected.
    files:
      create: []
      modify:
        - agentdiet/grid/types.py
        - agentdiet/cli/grid.py
        - agentdiet/grid/orchestrator.py
        - agentdiet/grid/runner.py
      test:
        - tests/prompt_robustness/test_cli_extension.py
    test_plan:
      - "CellSpec defaults prompt_variant='cooperative' and
        existing CellSpec callers see no change"
      - "cell_dir for prompt_variant='cooperative' equals the
        prior format — regression guard"
      - "cell_dir for prompt_variant='adversarial-strict' appends
        '__pv-adversarial-strict'"
      - "parse_cell_spec('qwen3:gsm8k:0') still parses with
        prompt_variant='cooperative'"
      - "parse_cell_spec('qwen3:gsm8k:0:adversarial-strict') sets
        the variant"
      - "parse_cell_spec rejects unknown variant names"
      - "CLI --prompt-sub-grid expands to exactly 6 cells, mixing
        thinking on/off across the 3 variants"
      - "main() with --cell qwen3:gsm8k:0:symmetric routes through
        the orchestrator and writes a directory ending in
        '__pv-symmetric'"
    coverage_min: 85

  - id: S4
    desc: integration tests + cooperative byte-identity guards
    approach: |
      Cross-cutting tests beyond per-step coverage:

        - End-to-end on a synthetic backend: the prompt-sub-grid
          shortcut runs all 6 cells through the orchestrator and
          writes 6 distinct artifact directories (cooperative cells
          land in the existing main-grid path; pv-suffixed cells
          land in dedicated subdirs). Synthetic backend produces
          per-question answers regardless of prompt content; the
          test asserts paths and count, not accuracy delta.

        - Prompt content regression: when the sub-grid runs the
          cooperative cell, the actual messages reaching the
          backend are byte-for-byte the same as a baseline cell
          with no --prompt-variant flag. Guarantees the "shared
          cooperative cell" is real.

        - Adversarial vs cooperative system-prompt spy: in a 1-question
          run, the system_prompt strings reaching the backend differ
          across variants exactly in the slots we expect (slot 1 for
          adversarial-strict; all 3 for symmetric).

      No new figure / analysis code in this feature — the
      cross-variant comparison is part of phase-mapping-analysis
      (next feature), which reads the per-cell summary.json files
      uniformly and stratifies by the cell_dir suffix.
    files:
      create:
        - tests/prompt_robustness/test_end_to_end.py
      modify: []
      test: []
    test_plan:
      - "prompt-sub-grid shortcut writes 6 cell directories on disk"
      - "cooperative cell from sub-grid has the same artifact path
        as a main-grid cooperative cell"
      - "adversarial-strict run sends the adversarial skeptic prompt
        to backend; cooperative run does not"
      - "symmetric run sends 3 identical system prompts in one
        round; cooperative does not"
    coverage_min: 80

decisions:
  - id: D1
    question: |
      How does prompt_variant flow through the existing CellSpec
      schema without breaking the on-disk artifacts already
      written by thinking-axis-grid?
    planner_view: |
      Add prompt_variant: str = "cooperative" to CellSpec.
      cell_dir keeps the prior format when variant is cooperative
      (preserves all existing artifacts/grid/{...}/ paths) and
      appends "__pv-{variant}" otherwise. Existing CellSpec
      constructions that don't pass the field get cooperative.
    confidence: 90
    rationale: |
      Adds an optional field with a back-compat default. cell_dir
      branch on cooperative-default keeps the main-grid path
      unchanged for already-written cells and lets the sub-grid
      cohabit the same parent directory.
    alternatives:
      - option: always-suffix-cell_dir
        rejected_because: |
          Would rename artifacts/grid/{...}/ for the main grid even
          when nothing changed. Breaks the resume contract.
      - option: separate-output-tree-for-sub-grid
        rejected_because: |
          Forces the analysis feature to read two parallel trees
          and merge them. The flat parent + suffix approach lets
          phase-mapping-analysis glob a single directory.
    ask_user: false
    user_decision: null

  - id: D2
    question: |
      What exact wording goes into the adversarial-strict skeptic
      and synthesizer prompts?
    planner_view: |
      Skeptic: keep the existing role framing, prepend "You MUST
      identify at least one concrete disagreement with the prior
      agents' work and explain why their step was wrong before
      proposing your own solution." Synthesizer: prepend "Before
      resolving, list every disagreement point you observed
      between prior agents and state which side you favor on each
      with a one-line reason." Both retain the FORMAT_INSTR tail
      so the parser keeps working.
    confidence: 85
    rationale: |
      Spec §4.5 names the obligations directly. Wording stays
      surgical so the only deltas vs. cooperative are the
      adversarial / synthesis-enumeration sentences.
    alternatives:
      - option: rewrite-from-scratch
        rejected_because: |
          Bigger surface for unintended drift; harder to attribute
          a measured Delta change to the role obligation alone vs.
          incidental phrasing changes.
    ask_user: false
    user_decision: null

  - id: D3
    question: |
      What does symmetric mean operationally — do all 3 agents
      get a brand-new "neutral solver" prompt, or do they all get
      the existing SOLVER_PROMPT?
    planner_view: |
      All 3 agents get the existing SOLVER_PROMPT. Spec §4.5
      defines symmetric as "3 identical agents, no role" — the
      existing SOLVER_PROMPT IS the no-role neutral solver. Reusing
      it keeps the comparison clean: the only delta vs. cooperative
      is "3 solvers" instead of "solver + skeptic + synthesizer".
    confidence: 85
    rationale: |
      Reusing SOLVER_PROMPT prevents an additional confound (new
      neutral-prompt phrasing). It also matches how the SA baseline
      is constructed in the main grid (also SOLVER_PROMPT).
    alternatives:
      - option: write-new-neutral-prompt
        rejected_because: |
          Adds an extra prompt that we'd then need to justify.
          Reusing SOLVER_PROMPT keeps fewer moving parts.
    ask_user: false
    user_decision: null

  - id: D4
    question: |
      Where does the cross-variant comparison code live — in this
      feature or in phase-mapping-analysis?
    planner_view: |
      In phase-mapping-analysis. That feature already needs to read
      per-cell summary.json files; once cell_dir suffix encodes the
      variant, stratifying by suffix is a one-line filter on top
      of the same loader. Putting it here would duplicate the
      bootstrap + figure code prematurely.
    confidence: 85
    rationale: |
      Single source of truth for "read summary.json -> compute
      Delta + CI". Otherwise we maintain two analyses and risk
      drift.
    alternatives:
      - option: put-comparison-here
        rejected_because: |
          Forces this feature to depend on bootstrap / figure code
          that doesn't exist yet, and the same code will be needed
          in the next feature anyway.
    ask_user: false
    user_decision: null

  - id: D5
    question: |
      Does the symmetric variant also affect run_voting? Voting
      uses SOLVER_PROMPT today and only one role concept, so
      "symmetric" is redundant there — but should the runner
      enforce that?
    planner_view: |
      No enforcement; voting always uses SOLVER_PROMPT regardless
      of variant. Symmetric only changes the debate condition's 3
      role prompts. Same for SA — uses SOLVER_PROMPT regardless.
      The variant only changes what the 3 debate agents see.
    confidence: 90
    rationale: |
      Spec §4.5 is about debate's role-prompt design. SA and voting
      are the baselines; perturbing them defeats the comparison.
    alternatives:
      - option: also-vary-voting-prompt
        rejected_because: |
          Conflates the manipulation. We want to isolate "does
          changing debate's role prompts change the SC-collapse
          result?", not "does changing every prompt change the
          result?".
    ask_user: false
    user_decision: null

# ============================================================
# GENERATOR section
# ============================================================

