  optimization:
    suggestions:
      - loc: agentdiet/cli/grid.py
        what: |
          parse_cell_spec accepts "qwen3:gsm8k:0" and treats it as
          cooperative, and accepts "qwen3:gsm8k:0:cooperative" as the
          same cell. CLI's dedup is string-based, so passing both
          spec forms in the same invocation runs the cell twice
          (the second is a no-op via resume). Either canonicalize
          both forms to the 4-segment shape post-parse before dedup,
          or document the dual entry. Not blocking — same on-disk
          path either way.
      - loc: agentdiet/grid/types.py
        what: |
          cell_dir's "cooperative" branch is a string-equality test.
          If a future variant happens to be named "cooperative" or
          if PROMPT_VARIANT_NAMES is renamed, the legacy-format
          regression guard breaks silently. Lock the registry name
          via a const re-import or lift the variant list into a
          shared constant module that both prompts.py and types.py
