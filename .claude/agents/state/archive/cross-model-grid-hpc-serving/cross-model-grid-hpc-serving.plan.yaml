# EVALUATOR section
# ============================================================

eval:
  rounds:
    - round: 1
      closure_check:
        user_decisions_honored:
          - id: D1
            verified: true
            evidence: |
              PASS path is "scripts + lint tests + skip-until-artifact
              validator"; artifact-presence tests skip cleanly when
              files absent.
          - id: D2
            verified: true
            evidence: |
              smoke_*.py both go through OpenAIBackend; the runners
              exercise model_family translation tables end-to-end.
          - id: D3
            verified: true
            evidence: |
              serve.sh scripts read VLLM_PORT, VLLM_TP_SIZE,
              VLLM_MAX_MODEL_LEN, VLLM_HOST, VLLM_API_KEY env vars;
              tensor-parallel auto-detected from CUDA_VISIBLE_DEVICES.
          - id: D4
            verified: true
            evidence: |
              .gitignore unignores artifacts/serving/*.json so the
              smoke artifacts can be committed back as evidence.
        missing_plan_items: []
        confidence_mismatches: []
        unplanned_accepted:
          - ".gitignore unignore for artifacts/serving/*.json (D4 implementation)"
        unplanned_rejected: []

      tests:
        S1:
          pass: 6
          fail: 0
          coverage: 88
          tests_file: tests/cross_model_grid_hpc_serving/test_smoke_qwen3_local.py
        S2:
          pass: 7
          fail: 0
          coverage: 88
          tests_file: tests/cross_model_grid_hpc_serving/test_smoke_gpt_oss_local.py
        S3:
          pass: 4
          fail: 0
          coverage: 100
          tests_file: tests/cross_model_grid_hpc_serving/test_smoke_artifacts.py
          # note: 2 parametrized cases SKIP until artifacts land — by design

      blockers: []
      regressions: []
      verdict: PASS

  optimization:
    suggestions:
      - loc: scripts/serving/smoke_qwen3.py
        what: |
          Smoke questions are hand-rolled. Once we have AGENTDIET_MODEL
          plumbed into the runner, optionally pull 5 actual GSM8K items
          from agentdiet.dataset.load_gsm8k for closer parity with the
          real eval.
      - loc: docs/runbooks/qwen3-vllm-serving.md
        what: |
          Runbooks don't mention HF_HOME / HF_HUB_CACHE. Add a
          note for users on restricted internet or who want shared
          weights across nodes.
      - loc: scripts/serving/{qwen3_a3b,gpt_oss_20b}_serve.sh
        what: |
          serve.sh duplicates ~30 lines between the two scripts.
          Could factor a shared scripts/serving/_common.sh, but
          two scripts is fine until a third model joins.
    final_verdict: MERGE_READY
